<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <!-- Phone frame -->
  <rect x="70" y="20" width="140" height="240" rx="20" fill="#FFFFFF" stroke="#1E88E5" stroke-width="3"/>
  <rect x="85" y="40" width="110" height="180" rx="5" fill="#F5F5F5"/>
  
  <!-- Attendance UI -->
  <text x="140" y="60" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">ATTENDANCE</text>
  
  <!-- Person icon -->
  <circle cx="110" y="90" r="15" fill="#1E88E5"/>
  <text x="110" y="95" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="white">P</text>
  
  <!-- Attendance list -->
  <rect x="95" y="115" width="90" height="20" rx="5" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="1"/>
  <rect x="95" y="145" width="90" height="20" rx="5" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="1"/>
  <rect x="95" y="175" width="90" height="20" rx="5" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="1"/>
  
  <!-- Check marks -->
  <circle cx="105" y="125" r="5" fill="#4CAF50"/>
  <path d="M102,125 L104,127 L108,123" stroke="white" stroke-width="1" fill="none"/>
</svg>